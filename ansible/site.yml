---
- name: Configure web server
  hosts: web
  become: true
  vars:
    site_root: /var/www/html

  tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: 120

    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Copy website page
      ansible.builtin.copy:
        src: ../site/index.html
        dest: "{{ site_root }}/index.html"
        owner: www-data
        group: www-data
        mode: "0644"

    - name: Ensure Nginx is enabled and running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
